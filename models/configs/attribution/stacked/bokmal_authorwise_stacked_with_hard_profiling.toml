[experiment]
kind = "stacked"
seed = 42

[materialization]
config_path = "data_pipeline/configs/materializations/bokmal_authorwise_char_word_stylo.toml"

[dev]
experiment_name = "bokmal_authorwise_stacked_with_hard_profiling"
selection_metric = "macro_f1"
save_prediction_top_k = 5
n_jobs = 3

[final]
experiment_name = "bokmal_authorwise_final_stacked_with_hard_profiling"
save_prediction_top_k = 5
n_jobs = 3
selected_candidates_path = "results/models/bokmal_authorwise/bokmal_authorwise_stacked_with_hard_profiling/seed_42/selected_candidates.json"

[fit]
inner_cv = 3
max_iter = 20000
tol = 0.0001
dual = "auto"
top_max_iter = 1000
top_k = [3, 5]

[search]
base_c_values = [10.0]
class_weights = ["balanced"]
top_c_values = [1.0, 10.0]

[profiling_source]
profiling_split_name = "bokmal_profiling"
profiling_materialization_name = "bokmal_profiling_char_word_stylo"
profiling_experiment_name = "bokmal_profiling_linear_svm"
profiling_seed = 42
targets = ["party", "female", "age_bin", "left_center_right"]

[[families]]
name = "char"
blocks = ["char"]

[[families]]
name = "word"
blocks = ["word"]

[[families]]
name = "stylo"
blocks = ["stylo"]

[[conditions]]
id = "char_word__hard_profiling_all"
label = "char_word__hard_profiling_all"
families = ["char", "word"]
profiling_blocks = [
    "profiling_hard_party",
    "profiling_hard_female",
    "profiling_hard_age_bin",
    "profiling_hard_left_center_right",
]

[[conditions]]
id = "char_word_stylo__hard_profiling_all"
label = "char_word_stylo__hard_profiling_all"
families = ["char", "word", "stylo"]
profiling_blocks = [
    "profiling_hard_party",
    "profiling_hard_female",
    "profiling_hard_age_bin",
    "profiling_hard_left_center_right",
]
