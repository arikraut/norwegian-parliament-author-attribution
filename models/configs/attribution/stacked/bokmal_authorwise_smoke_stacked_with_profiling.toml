# Phase 3B smoke config: dev-only staged stacked model with smoke profiling signals.

[experiment]
kind = "stacked"
seed = 42

[materialization]
config_path = "data_pipeline/configs/materializations/bokmal_authorwise_smoke.toml"

[dev]
experiment_name = "bokmal_authorwise_smoke_stacked_with_profiling"
selection_metric = "macro_f1"
save_prediction_top_k = 3
n_jobs = 3

[fit]
inner_cv = 2
max_iter = 20000
tol = 0.0001
dual = "auto"
top_max_iter = 100
top_k = [3]

[search]
base_c_values = [1.0]
class_weights = ["balanced"]
top_c_values = [1.0]

[profiling_source]
profiling_split_name = "bokmal_profiling_smoke"
profiling_materialization_name = "bokmal_profiling_smoke_char_word_stylo"
profiling_experiment_name = "bokmal_profiling_smoke_linear_svm"
profiling_seed = 42
targets = ["party", "female", "age_bin", "left_center_right"]

[[families]]
name = "char"
blocks = ["char"]

[[families]]
name = "word"
blocks = ["word"]

[[conditions]]
id = "char_word"
label = "char_word"
families = ["char", "word"]
profiling_blocks = [
    "profiling_party",
    "profiling_female",
    "profiling_age_bin",
    "profiling_left_center_right",
]
