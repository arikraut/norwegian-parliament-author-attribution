[experiment]
name = "bokmal_profiling_linear_svm"
seed = 42
selection_metric = "author_weighted_macro_f1"
save_prediction_top_k = 3
n_jobs = 3

[data]
splits_dir = "data/splits"
results_dir = "results/models"
artifacts_dir = "models/artifacts/profiling"

[source]
split_name = "bokmal_profiling"
materialization_name = "bokmal_profiling_char_word_stylo"
units = "all"
targets = ["party", "female", "age_bin", "left_center_right"]

[model]
family = "linear_svm"
C_values = [0.03, 0.1, 0.3, 1.0]
class_weights = ["balanced"]
max_iter = 20000
tol = 0.0001
dual = "auto"

[author_balance]
train_sample_weighting = "inverse_author_speech_count"
normalize_train_weights = true
report_author_weighted_eval = true

[[feature_sets]]
name = "char_word"
blocks = ["char", "word"]
normalize_rows = true

[[feature_sets]]
name = "char_word_blocknorm"
blocks = ["char", "word"]
normalize_rows = true
normalize_each_block = true

[[feature_sets]]
name = "stylo"
blocks = ["stylo"]
normalize_rows = true

[[feature_sets]]
name = "char"
blocks = ["char"]
normalize_rows = true

[[feature_sets]]
name = "word"
blocks = ["word"]
normalize_rows = true

[[feature_sets]]
name = "char_word_stylo_blocknorm"
blocks = ["char", "word", "stylo"]
normalize_rows = true
normalize_each_block = true

[[feature_sets]]
name = "char_word_stylo_half_stylo"
blocks = ["char", "word", "stylo"]
normalize_rows = true
normalize_each_block = true
block_weights = { stylo = 0.5 }

[[feature_sets]]
name = "char_word_stylo_downweighted"
blocks = ["char", "word", "stylo"]
normalize_rows = true
normalize_each_block = true
block_weights = { stylo = 0.25 }
