# NorBERT3 multi-task profiling classifier.
# One shared encoder trained jointly across all listed targets.
# Hyperparameters match the NorBERT3 paper fine-tuning setup.

[experiment]
name             = "bokmal_dev_norbert3_profiling_multitask"
seed             = 42
selection_metric = "macro_f1"

[data]
splits_dir    = "data/splits"
results_dir   = "results/models"
artifacts_dir = "models/artifacts/profiling"

[source]
split_name = "bokmal_profiling"
targets    = ["female", "age_bin", "left_right"]

[age_bins]
edges  = [0, 50, 200]
labels = ["<50", "50+"]

# Binary axis — left vs right.
[[party_axes]]
name  = "left_right"
left  = ["Ap", "SV", "Sp"]
right = ["H", "FrP", "V", "KrF"]

# Ternary axis — left / center / right.
[[party_axes]]
name   = "left_center_right"
left   = ["Ap", "SV"]
center = ["Sp", "V", "KrF"]
right  = ["H", "FrP"]

# Quaternary axis — left / center-left / center-right / right.
[[party_axes]]
name         = "left_center-left_center-right_right"
left         = ["SV"]
center_left  = ["Ap", "Sp"]
center_right = ["V", "KrF", "H"]
right        = ["FrP"]

[model]
family          = "bert_multitask_profiling"
pretrained_name = "ltg/norbert3-base"
max_length      = 512

[truncation]
pairs = [[128, 382]]

[training]
learning_rate      = 1e-5
epochs             = 5
batch_size         = 16
weight_decay       = 0.01
hidden_dropout     = 0.1
attention_dropout  = 0.1
max_speeches_per_author = 0   # 0 = use all speeches

# Optional per-task loss weights (default 1.0 for all).
# [task_weights]
# female           = 1.0
# age_bin          = 1.0
# left_right     = 1.0


